# ------------------------------------------------------------------------------
# E2E UAT – Playwright tests against the UAT environment
# ------------------------------------------------------------------------------
#
# What: Runs the full E2E suite (admin login, tenant list, Patria, etc.) in CI against UAT.
#
# When: Manual only (workflow_dispatch). Use "Run workflow" button in GitHub Actions tab.
#       Does NOT auto-trigger on PRs or pushes. PayPlan's deploy workflow handles automatic runs.
#
# Concurrency: If you push again to the same PR branch, the previous run is
#              cancelled and only the latest run executes (saves time and cost).
#
# How:
#   1. Checkout repo, set up Node 20, install deps (npm ci).
#   2. Install Playwright Chromium only (no Firefox/WebKit in CI).
#   3. Run tests headless via `npm run test:ci` with env from GitHub Secrets.
#   4. On failure: upload playwright-report and test-results as artifacts (7 days).
#
# Required GitHub Secrets: BASE_URL, ADMIN_EMAIL, ADMIN_PASSWORD, UI_AUTOMATION_KEY (all four so admin + Patria run).
# Optional: API_BASE_URL.
# Repo must have package-lock.json committed (run npm install and commit if missing).
#
name: E2E UAT

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E (UAT)
        run: npm run test:ci
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          UI_AUTOMATION_KEY: ${{ secrets.UI_AUTOMATION_KEY }}
          CI: true

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results (traces/screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
